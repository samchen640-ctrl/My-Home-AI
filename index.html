<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME-AI 助手 | 專業版</title>
    <!-- CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- JS Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        
        .markdown-body pre {
            background-color: #0d1117;
            padding: 1rem;
            border-radius: 0.75rem;
            margin: 0.75rem 0;
            overflow-x: auto;
            position: relative;
            border: 1px solid #30363d;
        }
        .markdown-body code { font-family: 'Fira Code', monospace; font-size: 0.875rem; }
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body ul, .markdown-body ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body li { list-style-type: disc; }
        
        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 0.7rem;
            background: #21262d;
            color: #8b949e;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #30363d;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: #30363d; color: #c9d1d9; }
        
        .chat-bubble { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* 自定義通知樣式 */
        #notification-host {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast {
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            background: #1f2937;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            border-left: 4px solid #3b82f6;
            animation: slideIn 0.3s ease;
            font-size: 0.875rem;
            max-width: 300px;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- 通知中心 -->
    <div id="notification-host"></div>

    <!-- 側邊設定面板 -->
    <aside id="sidebar" class="w-full md:w-80 bg-gray-900 border-r border-gray-800 flex flex-col flex-shrink-0 z-20 transition-all duration-300">
        <div class="p-6 overflow-y-auto flex-1">
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent flex items-center mb-8">
                <span class="mr-2 text-2xl">🤖</span> HOME-AI 助手
            </h1>

            <div class="space-y-6">
                <!-- API 設定區 -->
                <section>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">API 配置</label>
                    <div class="space-y-3">
                        <div>
                            <input type="text" id="baseUrl" class="w-full bg-gray-800/50 border border-gray-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-gray-600" placeholder="API 網址 (v1)" value="">
                        </div>
                        <div>
                            <input type="password" id="apiKey" class="w-full bg-gray-800/50 border border-gray-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-gray-600" placeholder="API 金鑰 (選填)" value="">
                        </div>
                        <div class="relative">
                            <select id="modelId" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all appearance-none cursor-pointer">
                                <option value="" disabled selected>請先測試連線...</option>
                            </select>
                            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-gray-500">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 參數設定區 -->
                <section>
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">溫度 (Temperature)</label>
                        <span id="tempValue" class="text-blue-400 text-xs font-mono bg-blue-400/10 px-2 py-0.5 rounded">0.7</span>
                    </div>
                    <input type="range" id="tempSlider" min="0" max="1.5" step="0.1" value="0.7" class="w-full h-1.5 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    <div class="flex justify-between text-[10px] text-gray-600 mt-2 px-1">
                        <span>更穩定</span>
                        <span>更有創意</span>
                    </div>
                </section>

                <!-- 操作按鈕 -->
                <div class="pt-4 space-y-2">
                    <button onclick="saveAndTest()" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold py-3 rounded-xl transition-all shadow-lg shadow-blue-900/20 active:scale-95">
                        連線並更新模型
                    </button>
                    <button onclick="clearChat()" class="w-full bg-gray-800/50 hover:bg-gray-800 text-gray-400 text-sm py-2.5 rounded-xl transition-all border border-gray-700/50">
                        清除對話
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 狀態欄 -->
        <div class="p-4 border-t border-gray-800 bg-gray-900/80 backdrop-blur-sm">
            <div id="fileStatusArea" class="hidden mb-3">
                <div class="flex items-center justify-between p-2.5 bg-blue-500/10 border border-blue-500/20 rounded-xl">
                    <div class="flex items-center overflow-hidden">
                        <span class="text-blue-400 mr-2 text-lg">📄</span>
                        <span id="fileName" class="text-xs text-blue-300 truncate font-medium">文件已載入</span>
                    </div>
                    <button onclick="removeFile()" class="text-gray-500 hover:text-red-400 p-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>
            </div>
            <button onclick="resetSettings()" class="w-full text-center text-gray-600 hover:text-red-400 text-[10px] transition-colors py-1">
                重設所有設定與快取
            </button>
        </div>
    </aside>

    <!-- 主聊天區 -->
    <main class="flex-1 flex flex-col relative bg-gray-950">
        <!-- 頂部導覽列 -->
        <header class="h-14 border-b border-gray-800 flex items-center px-4 md:px-8 justify-between bg-gray-950/50 backdrop-blur-lg">
            <div class="flex items-center space-x-3">
                <div id="connStatus" class="w-2.5 h-2.5 rounded-full bg-gray-700 shadow-[0_0_8px_rgba(55,65,81,0.5)]"></div>
                <span id="connLabel" class="text-xs font-medium text-gray-500">等待設定連線...</span>
            </div>
            
            <div id="loader" class="hidden flex items-center space-x-3 bg-blue-500/10 px-3 py-1 rounded-full border border-blue-500/20">
                <div class="flex space-x-1">
                    <div class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-bounce [animation-duration:0.8s]"></div>
                    <div class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-bounce [animation-duration:0.8s] [animation-delay:0.2s]"></div>
                    <div class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-bounce [animation-duration:0.8s] [animation-delay:0.4s]"></div>
                </div>
                <span class="text-[10px] font-bold text-blue-400 uppercase tracking-tighter">AI 思考中</span>
            </div>
        </header>

        <!-- 訊息展示區 -->
        <div id="chatDisplay" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-10 scroll-smooth">
            <!-- 初始引導內容 -->
            <div class="max-w-2xl mx-auto py-12 text-center space-y-6">
                <div class="w-20 h-20 bg-blue-600/20 rounded-3xl flex items-center justify-center mx-auto shadow-2xl">
                    <span class="text-4xl">🤖</span>
                </div>
                <div class="space-y-2">
                    <h2 class="text-2xl font-bold">歡迎使用 HOME-AI 助手</h2>
                    <p class="text-gray-400 text-sm max-w-sm mx-auto">
                        請在左側輸入你的 API 位址與金鑰，點擊連線後即可選擇模型並開始對話。
                    </p>
                </div>
                <div class="flex flex-wrap justify-center gap-2">
                    <span class="px-3 py-1 bg-gray-900 border border-gray-800 rounded-full text-[11px] text-gray-500">支援 PDF 文件解析</span>
                    <span class="px-3 py-1 bg-gray-900 border border-gray-800 rounded-full text-[11px] text-gray-500">流式串流輸出</span>
                    <span class="px-3 py-1 bg-gray-900 border border-gray-800 rounded-full text-[11px] text-gray-500">代碼高亮顯示</span>
                </div>
            </div>
        </div>

        <!-- 輸入控制區 -->
        <div class="p-4 md:p-8">
            <div class="max-w-4xl mx-auto">
                <div class="relative bg-gray-900/50 backdrop-blur-md border border-gray-800 rounded-3xl p-2.5 shadow-2xl focus-within:border-blue-600/50 focus-within:ring-4 focus-within:ring-blue-600/5 transition-all">
                    <div class="flex items-end gap-2">
                        <!-- 檔案上傳 -->
                        <input type="file" id="fileInput" class="hidden" onchange="handleFileUpload()" accept=".txt,.pdf,.md,.js,.py,.html,.css,.json">
                        <button onclick="document.getElementById('fileInput').click()" class="flex-shrink-0 hover:bg-gray-800 text-gray-400 p-3.5 rounded-2xl transition-all group active:scale-90" title="上傳文件">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:text-blue-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                            </svg>
                        </button>

                        <div class="flex-1">
                            <textarea id="userInput" rows="1" class="w-full bg-transparent border-none rounded-xl p-3.5 text-base text-white focus:ring-0 outline-none resize-none overflow-hidden max-h-60 placeholder:text-gray-600" placeholder="詢問任何問題..." oninput="autoGrow(this)" onkeydown="checkEnter(event)"></textarea>
                        </div>

                        <!-- 發送按鈕 -->
                        <button id="sendBtn" onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 text-white p-3.5 rounded-2xl transition-all shadow-lg shadow-blue-900/40 disabled:opacity-50 disabled:cursor-not-allowed group active:scale-90">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:translate-x-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                            </svg>
                        </button>
                    </div>
                </div>
                <p class="text-center text-[10px] text-gray-700 mt-4 uppercase tracking-[0.2em] font-bold">Powered by OpenAI Compatible API</p>
            </div>
        </div>
    </main>

    <script>
        // PDF.js 初始化
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let isGenerating = false;
        let abortController = null;
        let attachedFileContent = "";
        
        // Markdown 配置
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true
        });

        // 頁面加載讀取設定
        window.onload = () => {
            const savedBaseUrl = localStorage.getItem('ai_base_url');
            const savedApiKey = localStorage.getItem('ai_api_key');
            const savedModelId = localStorage.getItem('ai_model_id');
            const savedTemp = localStorage.getItem('ai_temp');

            if (savedBaseUrl) document.getElementById('baseUrl').value = savedBaseUrl;
            if (savedApiKey) document.getElementById('apiKey').value = savedApiKey;
            if (savedTemp) {
                document.getElementById('tempSlider').value = savedTemp;
                document.getElementById('tempValue').textContent = savedTemp;
            }
            
            if (savedBaseUrl) {
                testConnection(false);
            }
        };

        // 提示訊息工具
        function showToast(msg, type = 'info') {
            const host = document.getElementById('notification-host');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (type === 'error') toast.style.borderLeftColor = '#ef4444';
            if (type === 'success') toast.style.borderLeftColor = '#10b981';
            toast.textContent = msg;
            host.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 滑桿事件
        const tempSlider = document.getElementById('tempSlider');
        tempSlider.addEventListener('input', () => {
            document.getElementById('tempValue').textContent = tempSlider.value;
            localStorage.setItem('ai_temp', tempSlider.value);
        });

        // 輸入框自動增長
        function autoGrow(el) {
            el.style.height = "auto";
            el.style.height = (el.scrollHeight) + "px";
        }

        function checkEnter(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // 訊息渲染
        function appendMessage(role, text) {
            const display = document.getElementById('chatDisplay');
            
            // 如果是第一條訊息，清除歡迎畫面
            if (display.querySelector('.py-12')) {
                display.innerHTML = '';
            }

            const wrapper = document.createElement('div');
            wrapper.className = `flex items-start chat-bubble ${role === 'user' ? 'flex-row-reverse' : ''}`;

            const avatar = document.createElement('div');
            if (role === 'user') {
                avatar.className = 'flex-shrink-0 w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center ml-4 shadow-lg';
                avatar.innerHTML = '<span class="text-[10px] font-bold">ME</span>';
            } else {
                avatar.className = 'flex-shrink-0 w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center mr-4 shadow-lg';
                avatar.innerHTML = '<span class="text-[10px] font-bold">AI</span>';
            }

            const bubble = document.createElement('div');
            bubble.className = role === 'user' 
                ? 'bg-blue-600 text-white rounded-2xl rounded-tr-none p-4 max-w-[85%] shadow-xl'
                : 'bg-gray-900 border border-gray-800 text-gray-200 rounded-2xl rounded-tl-none p-5 max-w-[85%] md:max-w-3xl shadow-xl markdown-body';

            const content = document.createElement('div');
            content.className = 'text-[15px] leading-relaxed';
            
            if (role === 'user') {
                content.textContent = text;
            } else {
                content.innerHTML = marked.parse(text || '...');
            }

            bubble.appendChild(content);
            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            display.appendChild(wrapper);
            display.scrollTop = display.scrollHeight;

            return content;
        }

        // 檔案上傳處理
        async function handleFileUpload() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            const statusArea = document.getElementById('fileStatusArea');
            const nameLabel = document.getElementById('fileName');
            
            statusArea.classList.remove('hidden');
            nameLabel.textContent = `解析中...`;

            try {
                let text = "";
                if (file.type === "application/pdf") {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(s => s.str).join(' ') + "\n";
                    }
                } else {
                    text = await file.text();
                }
                attachedFileContent = text;
                nameLabel.textContent = `${file.name} (${text.length} 字)`;
                showToast("文件載入成功", "success");
            } catch (err) {
                showToast("檔案讀取失敗: " + err.message, "error");
                removeFile();
            }
        }

        function removeFile() {
            attachedFileContent = "";
            document.getElementById('fileInput').value = "";
            document.getElementById('fileStatusArea').classList.add('hidden');
        }

        // 連線與儲存
        async function saveAndTest() {
            const b = document.getElementById('baseUrl').value.trim();
            const k = document.getElementById('apiKey').value.trim();

            if (!b) {
                showToast("請輸入 API 網址", "error");
                return;
            }

            localStorage.setItem('ai_base_url', b);
            localStorage.setItem('ai_api_key', k);

            testConnection(true);
        }

        async function resetSettings() {
            localStorage.clear();
            location.reload();
        }

        // 測試連線並獲取模型
        async function testConnection(manual) {
            const b = document.getElementById('baseUrl').value.trim();
            const k = document.getElementById('apiKey').value.trim();
            const mSelect = document.getElementById('modelId');
            const dot = document.getElementById('connStatus');
            const label = document.getElementById('connLabel');

            if (!b) return;

            dot.className = 'w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse shadow-[0_0_8px_rgba(234,179,8,0.5)]';
            label.textContent = '正在獲取模型清單...';

            const headers = { "ngrok-skip-browser-warning": "true" };
            if (k) headers["Authorization"] = `Bearer ${k}`;

            try {
                const res = await fetch(`${b}/models`, { headers });
                
                if (res.ok) {
                    const data = await res.json();
                    const models = data.data || [];
                    
                    mSelect.innerHTML = '';
                    if (models.length === 0) {
                        const opt = document.createElement('option');
                        opt.value = "";
                        opt.textContent = "未找到可用模型";
                        mSelect.appendChild(opt);
                    } else {
                        models.forEach(model => {
                            const opt = document.createElement('option');
                            opt.value = model.id;
                            opt.textContent = model.id;
                            mSelect.appendChild(opt);
                        });

                        // 恢復先前選中的模型
                        const savedModel = localStorage.getItem('ai_model_id');
                        if (savedModel && models.some(m => m.id === savedModel)) {
                            mSelect.value = savedModel;
                        } else {
                            mSelect.selectedIndex = 0;
                            localStorage.setItem('ai_model_id', mSelect.value);
                        }
                    }

                    dot.className = 'w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]';
                    label.textContent = `已連線: ${models.length} 個模型`;
                    if (manual) showToast("連線成功，模型清單已更新", "success");
                    
                    // 監聽選擇變化
                    mSelect.onchange = () => {
                        localStorage.setItem('ai_model_id', mSelect.value);
                    };
                } else {
                    throw new Error("HTTP " + res.status);
                }
            } catch (e) {
                dot.className = 'w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]';
                label.textContent = '連線失敗';
                mSelect.innerHTML = '<option value="" disabled selected>連線失敗</option>';
                if (manual) showToast("連線失敗，請檢查網址或金鑰", "error");
            }
        }

        // 發送訊息
        async function sendMessage() {
            if (isGenerating) {
                if (abortController) abortController.abort();
                return;
            }

            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text && !attachedFileContent) return;

            const b = document.getElementById('baseUrl').value.trim();
            const m = document.getElementById('modelId').value;

            if (!b || !m) {
                showToast("請確認 API 設定與模型選擇", "error");
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            const loader = document.getElementById('loader');
            
            isGenerating = true;
            sendBtn.innerHTML = '<svg class="h-6 w-6 animate-spin" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            loader.classList.remove('hidden');

            appendMessage('user', text);
            const aiContainer = appendMessage('ai', '');
            let fullText = "";
            
            input.value = "";
            input.style.height = "auto";
            abortController = new AbortController();

            const k = document.getElementById('apiKey').value.trim();
            const t = parseFloat(document.getElementById('tempSlider').value);

            let prompt = text;
            if (attachedFileContent) {
                prompt = `[參考文件內容]\n${attachedFileContent}\n\n[使用者提問]\n${text}`;
            }

            const headers = {
                'Content-Type': 'application/json',
                'ngrok-skip-browser-warning': 'true'
            };
            if (k) headers['Authorization'] = `Bearer ${k}`;

            try {
                const response = await fetch(`${b}/chat/completions`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        model: m,
                        messages: [{ role: "user", content: prompt }],
                        temperature: t,
                        stream: true
                    }),
                    signal: abortController.signal
                });

                if (!response.ok) throw new Error("伺服器回應錯誤: " + response.status);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        const str = line.replace(/^data: /, "").trim();
                        if (!str || str === "[DONE]") continue;
                        
                        try {
                            const json = JSON.parse(str);
                            const content = json.choices[0].delta.content || "";
                            fullText += content;
                            aiContainer.innerHTML = marked.parse(fullText);
                            
                            // 更新代碼高亮與複製按鈕
                            aiContainer.querySelectorAll('pre code').forEach((block) => {
                                if (!block.dataset.highlighted) {
                                    hljs.highlightElement(block);
                                    block.dataset.highlighted = 'true';
                                }
                                if (!block.parentElement.querySelector('.copy-btn')) {
                                    const btn = document.createElement('button');
                                    btn.className = 'copy-btn';
                                    btn.textContent = 'Copy';
                                    btn.onclick = () => copyCode(block.innerText, btn);
                                    block.parentElement.appendChild(btn);
                                }
                            });
                            document.getElementById('chatDisplay').scrollTop = document.getElementById('chatDisplay').scrollHeight;
                        } catch (e) {}
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    aiContainer.innerHTML += '<p class="text-orange-400 italic mt-3 text-xs border-t border-gray-800 pt-2">對話已由使用者中止。</p>';
                } else {
                    aiContainer.innerHTML = `<div class="bg-red-500/10 border border-red-500/20 p-4 rounded-xl text-red-400 text-sm">
                        <strong>連線出錯：</strong><br>${err.message}
                    </div>`;
                }
            } finally {
                isGenerating = false;
                sendBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" /></svg>';
                loader.classList.add('hidden');
            }
        }

        function copyCode(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = 'Copied!';
                btn.style.backgroundColor = '#10b981';
                btn.style.color = 'white';
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.style.backgroundColor = '';
                    btn.style.color = '';
                }, 2000);
            });
        }

        function clearChat() {
            if (confirm("確定要清除所有對話紀錄嗎？")) {
                document.getElementById('chatDisplay').innerHTML = '';
                showToast("對話已清除");
            }
        }
    </script>
</body>
</html>
